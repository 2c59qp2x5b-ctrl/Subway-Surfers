<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers Decrypter</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/jsoneditor/9.10.4/jsoneditor.min.css" rel="stylesheet" type="text/css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsoneditor/9.10.4/jsoneditor.min.js"></script>

    <style>
        /* Personnalisation de JSONEditor pour correspondre exactement aux captures d'écran */
        .jsoneditor {
            border: 1px solid #e5e7eb !important;
            border-radius: 0.75rem !important;
            overflow: hidden !important;
        }
        .jsoneditor-menu {
            background-color: #3b82f6 !important; /* Bleu royal de la barre d'outils */
            border-bottom: 1px solid #3b82f6 !important;
        }
        .jsoneditor-navigation_bar {
            border-bottom: 1px solid #e5e7eb !important;
        }
        .jsoneditor-outer {
            border-radius: 0 0 0.75rem 0.75rem;
        }
        /* Nettoyage des styles natifs d'input */
        input[type="text"] focus {
            outline: none;
        }
    </style>
</head>
<body class="bg-white text-gray-800 font-sans antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Configuration des monnaies de Subway Surfers
        const CURRENCY_MAP = {
          "1": { name: "Coins", icon: "🪙" },
          "2": { name: "Keys", icon: "🔑" },
          "3": { name: "Hoverboards", icon: "🛹" },
          "4": { name: "Score boosters", icon: "✨" },
          "5": { name: "Headstarts", icon: "🚀" }
        };

        // Composant Wrapper pour intégrer proprement JSONEditor avec React
        function JsonTreeEditor({ value, onChange }) {
          const containerRef = useRef(null);
          const editorRef = useRef(null);
          const isUpdatingRef = useRef(false);

          useEffect(() => {
            const options = {
              mode: 'tree',
              modes: ['text', 'tree', 'table'], 
              onChangeJSON: (json) => {
                if (!isUpdatingRef.current) {
                  onChange(json);
                }
              },
              onChangeText: (text) => {
                if (!isUpdatingRef.current) {
                  try {
                    const json = JSON.parse(text);
                    onChange(json);
                  } catch (e) {}
                }
              }
            };
            
            editorRef.current = new JSONEditor(containerRef.current, options);
            editorRef.current.set(value);

            return () => {
              if (editorRef.current) {
                editorRef.current.destroy();
              }
            };
          }, []);

          // Met à jour l'éditeur si les données changent depuis le mode "Quick Edit"
          useEffect(() => {
            if (editorRef.current && JSON.stringify(editorRef.current.get()) !== JSON.stringify(value)) {
              isUpdatingRef.current = true;
              editorRef.current.update(value);
              isUpdatingRef.current = false;
            }
          }, [value]);

          return <div ref={containerRef} className="w-full h-[500px]" />;
        }

        function App() {
          const [fileData, setFileData] = useState(null);
          const [originalData, setOriginalData] = useState(null);
          const [fileName, setFileName] = useState("wallet.json");
          const [activeTab, setActiveTab] = useState("quick"); 
          const [showRestoreModal, setShowRestoreModal] = useState(false);
          const [focusedKey, setFocusedKey] = useState(null); // Pour la gestion propre du formatage des nombres
          const fileInputRef = useRef(null);

          // Chargement du fichier
          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              setFileName(file.name);
              readFile(file);
            }
          };

          const readFile = (file) => {
            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const json = JSON.parse(event.target.result);
                setFileData(json);
                setOriginalData(JSON.parse(event.target.result));
              } catch (err) {
                alert("Fichier JSON invalide !");
              }
            };
            reader.readAsText(file);
          };

          // Presse-papier
          const handlePaste = async () => {
            try {
              const text = await navigator.clipboard.readText();
              const json = JSON.parse(text);
              setFileData(json);
              setOriginalData(JSON.parse(text));
              setFileName("wallet.json");
            } catch (err) {
              alert("Le contenu du presse-papier n'est pas un JSON valide.");
            }
          };

          // Changement des valeurs numériques (Quick Edit)
          const handleCurrencyChange = (key, val) => {
            const numericValue = Math.max(0, parseInt(val) || 0);
            const updated = {
              ...fileData,
              currencies: {
                ...fileData.currencies,
                [key]: {
                  ...fileData.currencies[key],
                  value: numericValue
                }
              }
            };
            setFileData(updated);
          };

          // Changement global via l'éditeur d'arbre (Raw Edit)
          const handleJsonEditorChange = (newJson) => {
            setFileData(newJson);
          };

          // Exportation du fichier
          const handleExport = () => {
            if (!fileData) return;
            const blob = new Blob([JSON.stringify(fileData, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
          };

          // Restauration
          const handleRestore = () => {
            const original = JSON.parse(JSON.stringify(originalData));
            setFileData(original);
            setShowRestoreModal(false);
          };

          return (
            <div className="min-h-screen bg-white text-gray-800 flex flex-col items-center p-4">
              
              {/* Top Title Bar */}
              <div className="w-full max-w-2xl border-b border-gray-100 pb-4 mb-6 flex items-center justify-between mt-2">
                <span className="font-bold text-lg text-black tracking-tight">Subway Surfers Decrypter</span>
              </div>

              {!fileData ? (
                /* ---------------- ÉCRAN D'ACCUEIL ---------------- */
                <div className="w-full max-w-xl border border-gray-200 rounded-2xl p-8 text-center bg-white shadow-sm mt-12">
                  <div className="bg-gray-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg className="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                    </svg>
                  </div>
                  <h2 className="text-xl font-bold text-black mb-2">Get started</h2>
                  <p className="text-sm text-gray-500 mb-6 px-4 leading-relaxed">
                    Import your Subway Surfers profile files to view and edit them. You can directly select JSON files or paste content directly from your clipboard. You can also just copy the <span className="font-semibold text-gray-700">text</span> of the file.
                  </p>
                  
                  <div className="flex flex-col sm:flex-row justify-center gap-3 mb-6">
                    <button 
                      onClick={() => fileInputRef.current.click()} 
                      className="bg-black text-white px-6 py-2.5 rounded-xl font-medium hover:bg-gray-800 transition shadow-sm"
                    >
                      📤 Upload file(s)
                    </button>
                    <input 
                      type="file" 
                      ref={fileInputRef} 
                      onChange={handleFileUpload} 
                      accept=".json" 
                      className="hidden" 
                    />
                    <button 
                      onClick={handlePaste}
                      className="bg-gray-100 text-black px-6 py-2.5 rounded-xl font-medium hover:bg-gray-200 transition"
                    >
                      📋 Paste from clipboard
                    </button>
                  </div>
                  <p className="text-xs text-gray-400">
                    Tip: You can also drag & drop .json files anywhere on the page or press Ctrl/Cmd+V to paste.
                  </p>
                </div>
              ) : (
                /* ---------------- ÉCRAN D'ÉDITION ---------------- */
                <div className="w-full max-w-2xl">
                  
                  {/* File Badge Info */}
                  <div className="flex items-center gap-2 mb-4 text-black font-semibold text-sm bg-gray-50 px-3 py-1.5 rounded-lg w-fit">
                    📁 {fileName}
                  </div>

                  {/* Top Action Buttons */}
                  <div className="grid grid-cols-2 gap-3 mb-4">
                    <button 
                      onClick={handleExport}
                      className="border border-gray-200 hover:bg-gray-50 text-black font-medium py-2.5 rounded-xl transition flex items-center justify-center gap-2 text-sm shadow-sm"
                    >
                      📥 Export
                    </button>
                    <button 
                      onClick={() => setShowRestoreModal(true)}
                      className="border border-gray-200 hover:bg-gray-50 text-black font-medium py-2.5 rounded-xl transition flex items-center justify-center gap-2 text-sm shadow-sm"
                    >
                      🔄 Restore
                    </button>
                  </div>

                  {/* Tabs Selector */}
                  <div className="grid grid-cols-2 bg-gray-100 p-1 rounded-xl mb-6">
                    <button 
                      onClick={() => setActiveTab("quick")}
                      className={`py-2 text-sm font-medium rounded-lg transition ${activeTab === 'quick' ? 'bg-white text-black shadow-sm' : 'text-gray-500 hover:text-black'}`}
                    >
                      Quick edit
                    </button>
                    <button 
                      onClick={() => setActiveTab("raw")}
                      className={`py-2 text-sm font-medium rounded-lg transition ${activeTab === 'raw' ? 'bg-white text-black shadow-sm' : 'text-gray-500 hover:text-black'}`}
                    >
                      Raw edit
                    </button>
                  </div>

                  {/* Tab Contents */}
                  {activeTab === "quick" ? (
                    <div className="space-y-4">
                      {fileData.currencies ? (
                        Object.keys(CURRENCY_MAP).map((key) => {
                          const currency = fileData.currencies[key];
                          if (!currency) return null;
                          const meta = CURRENCY_MAP[key];

                          // Détermine si l'input est actuellement sélectionné par l'utilisateur
                          const isFocused = focusedKey === key;
                          // Formate la valeur avec des virgules pour les milliers si l'utilisateur ne tape pas dedans
                          const displayValue = isFocused 
                            ? currency.value 
                            : new Intl.NumberFormat('en-US').format(currency.value);

                          return (
                            <div key={key} className="border border-gray-200 rounded-2xl p-5 bg-white shadow-sm flex flex-col gap-3">
                              <div className="flex items-center gap-2 font-bold text-black text-base">
                                <span className="text-xl">{meta.icon}</span>
                                <span>{meta.name}</span>
                              </div>
                              
                              {/* Formulaire Capsule propre sans barre de séparation interne */}
                              <div className="flex items-center border border-gray-200 rounded-xl bg-white h-12 shadow-sm focus-within:border-gray-400 transition">
                                <button 
                                  onClick={() => handleCurrencyChange(key, currency.value - 1)}
                                  className="px-5 h-full text-gray-500 hover:text-black text-2xl font-light select-none transition"
                                >
                                  −
                                </button>
                                <input 
                                  type="text" 
                                  value={displayValue}
                                  onFocus={() => setFocusedKey(key)}
                                  onBlur={() => setFocusedKey(null)}
                                  onChange={(e) => {
                                    // Garde uniquement les chiffres saisis
                                    const val = e.target.value.replace(/\D/g, '');
                                    handleCurrencyChange(key, val);
                                  }}
                                  className="w-full text-center h-full font-bold text-gray-900 focus:outline-none bg-transparent text-base"
                                />
                                <button 
                                  onClick={() => handleCurrencyChange(key, currency.value + 1)}
                                  className="px-5 h-full text-gray-500 hover:text-black text-2xl font-light select-none transition"
                                >
                                  +
                                </button>
                              </div>
                            </div>
                          );
                        })
                      ) : (
                        /* Message d'aide si le fichier n'est pas wallet.json (ex: achievements.json) */
                        <div className="text-center py-12 border border-dashed border-gray-200 rounded-2xl p-6">
                          <p className="text-gray-500 text-sm mb-2">Ce fichier ne contient pas de structure de monnaies standard.</p>
                          <p className="text-blue-500 font-medium text-sm cursor-pointer hover:underline" onClick={() => setActiveTab("raw")}>
                            👉 Utilisez l'onglet "Raw edit" pour modifier la structure de ce fichier.
                          </p>
                        </div>
                      )}
                    </div>
                  ) : (
                    /* Intégration de l'éditeur d'arbre JSON complet identique aux captures */
                    <div className="bg-white rounded-xl shadow-sm">
                      <JsonTreeEditor value={fileData} onChange={handleJsonEditorChange} />
                    </div>
                  )}
                </div>
              )}

              {/* ---------------- MODAL RESTORE ---------------- */}
              {showRestoreModal && (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                  <div className="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl border border-gray-100">
                    <h3 className="text-lg font-bold text-black mb-1 text-center">Restore to original state</h3>
                    <p className="text-sm text-gray-500 mb-6 text-center">
                      Restore the file to the original state. You will lose all your changes.
                    </p>
                    <div className="flex flex-col gap-2">
                      <button 
                        onClick={handleRestore}
                        className="w-full bg-black text-white py-2.5 rounded-xl font-medium hover:bg-gray-800 transition"
                      >
                        Restore
                      </button>
                      <button 
                        onClick={() => setShowRestoreModal(false)}
                        className="w-full bg-gray-100 text-black py-2.5 rounded-xl font-medium hover:bg-gray-200 transition"
                      >
                        Close
                      </button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
