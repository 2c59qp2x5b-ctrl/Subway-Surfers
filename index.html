<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers Decrypter</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Supprime les flèches par défaut sur les inputs de type number */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-white text-gray-800 font-sans antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // Correspondance des IDs de monnaies du jeu Subway Surfers
        const CURRENCY_MAP = {
          "1": { name: "Coins", icon: "🪙" },
          "2": { name: "Keys", icon: "🔑" },
          "3": { name: "Hoverboards", icon: "🛹" },
          "4": { name: "Score boosters", icon: "✨" },
          "5": { name: "Headstarts", icon: "🚀" }
        };

        function App() {
          const [fileData, setFileData] = useState(null);
          const [originalData, setOriginalData] = useState(null);
          const [fileName, setFileName] = useState("wallet.json");
          const [activeTab, setActiveTab] = useState("quick"); // "quick" ou "raw"
          const [showRestoreModal, setShowRestoreModal] = useState(false);
          const [rawText, setRawText] = useState("");
          const fileInputRef = useRef(null);

          // Charger le fichier JSON
          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              setFileName(file.name);
              readFile(file);
            }
          };

          const readFile = (file) => {
            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const json = JSON.parse(event.target.result);
                setFileData(json);
                setOriginalData(JSON.parse(event.target.result));
                setRawText(JSON.stringify(json, null, 2));
              } catch (err) {
                alert("Fichier JSON invalide !");
              }
            };
            reader.readAsText(file);
          };

          // Coller depuis le presse-papier
          const handlePaste = async () => {
            try {
              const text = await navigator.clipboard.readText();
              const json = JSON.parse(text);
              setFileData(json);
              setOriginalData(JSON.parse(text));
              setRawText(JSON.stringify(json, null, 2));
              setFileName("wallet.json");
            } catch (err) {
              alert("Le contenu du presse-papier n'est pas un JSON valide.");
            }
          };

          // Modifier une valeur (Quick Edit)
          const handleCurrencyChange = (key, val) => {
            const newValue = Math.max(0, parseInt(val) || 0);
            const updated = {
              ...fileData,
              currencies: {
                ...fileData.currencies,
                [key]: {
                  ...fileData.currencies[key],
                  value: newValue
                }
              }
            };
            setFileData(updated);
            setRawText(JSON.stringify(updated, null, 2));
          };

          // Modifier le texte brut (Raw Edit)
          const handleRawChange = (e) => {
            const text = e.target.value;
            setRawText(text);
            try {
              const json = JSON.parse(text);
              setFileData(json);
            } catch (err) {
              // On ne bloque pas la saisie si le JSON est temporairement mal formé
            }
          };

          // Exporter le fichier modifié
          const handleExport = () => {
            if (!fileData) return;
            const blob = new Blob([JSON.stringify(fileData, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
          };

          // Restaurer l'état d'origine
          const handleRestore = () => {
            const original = JSON.parse(JSON.stringify(originalData));
            setFileData(original);
            setRawText(JSON.stringify(original, null, 2));
            setShowRestoreModal(false);
          };

          return (
            <div className="min-h-screen bg-white text-gray-800 flex flex-col items-center p-4">
              
              {/* Top Header */}
              <div className="w-full max-w-2xl border-b border-gray-100 pb-4 mb-6 flex items-center justify-between mt-2">
                <span className="font-bold text-lg text-black tracking-tight">Subway Surfers Decrypter</span>
              </div>

              {!fileData ? (
                /* ---------------- ÉCRAN D'ACCUEIL ---------------- */
                <div className="w-full max-w-xl border border-gray-200 rounded-2xl p-8 text-center bg-white shadow-sm mt-12">
                  <div className="bg-gray-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg className="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                    </svg>
                  </div>
                  <h2 className="text-xl font-bold text-black mb-2">Get started</h2>
                  <p className="text-sm text-gray-500 mb-6 px-4 leading-relaxed">
                    Import your Subway Surfers profile files to view and edit them. You can directly select JSON files or paste content directly from your clipboard. You can also just copy the <span className="font-semibold text-gray-700">text</span> of the file.
                  </p>
                  
                  <div className="flex flex-col sm:flex-row justify-center gap-3 mb-6">
                    <button 
                      onClick={() => fileInputRef.current.click()} 
                      className="bg-black text-white px-6 py-2.5 rounded-xl font-medium hover:bg-gray-800 transition shadow-sm"
                    >
                      📤 Upload file(s)
                    </button>
                    <input 
                      type="file" 
                      ref={fileInputRef} 
                      onChange={handleFileUpload} 
                      accept=".json" 
                      className="hidden" 
                    />
                    <button 
                      onClick={handlePaste}
                      className="bg-gray-100 text-black px-6 py-2.5 rounded-xl font-medium hover:bg-gray-200 transition"
                    >
                      📋 Paste from clipboard
                    </button>
                  </div>
                  <p className="text-xs text-gray-400">
                    Tip: You can also drag & drop .json files anywhere on the page or press Ctrl/Cmd+V to paste.
                  </p>
                </div>
              ) : (
                /* ---------------- ÉCRAN D'ÉDITION ---------------- */
                <div className="w-full max-w-2xl">
                  
                  {/* File Info */}
                  <div className="flex items-center gap-2 mb-4 text-black font-semibold text-sm bg-gray-50 px-3 py-1.5 rounded-lg w-fit">
                    📁 {fileName}
                  </div>

                  {/* Top Actions */}
                  <div className="grid grid-cols-2 gap-3 mb-4">
                    <button 
                      onClick={handleExport}
                      className="border border-gray-200 hover:bg-gray-50 text-black font-medium py-2.5 rounded-xl transition flex items-center justify-center gap-2 text-sm"
                    >
                      📥 Export
                    </button>
                    <button 
                      onClick={() => setShowRestoreModal(true)}
                      className="border border-gray-200 hover:bg-gray-50 text-black font-medium py-2.5 rounded-xl transition flex items-center justify-center gap-2 text-sm"
                    >
                      🔄 Restore
                    </button>
                  </div>

                  {/* Navigation Tabs */}
                  <div className="grid grid-cols-2 bg-gray-100 p-1 rounded-xl mb-6">
                    <button 
                      onClick={() => setActiveTab("quick")}
                      className={`py-2 text-sm font-medium rounded-lg transition ${activeTab === 'quick' ? 'bg-white text-black shadow-sm' : 'text-gray-500 hover:text-black'}`}
                    >
                      Quick edit
                    </button>
                    <button 
                      onClick={() => setActiveTab("raw")}
                      className={`py-2 text-sm font-medium rounded-lg transition ${activeTab === 'raw' ? 'bg-white text-black shadow-sm' : 'text-gray-500 hover:text-black'}`}
                    >
                      Raw edit
                    </button>
                  </div>

                  {/* Tab Contents */}
                  {activeTab === "quick" ? (
                    <div className="space-y-4">
                      {fileData.currencies && Object.keys(CURRENCY_MAP).map((key) => {
                        const currency = fileData.currencies[key];
                        if (!currency) return null;
                        const meta = CURRENCY_MAP[key];

                        return (
                          <div key={key} className="border border-gray-200 rounded-xl p-4 bg-white shadow-sm flex flex-col gap-3">
                            <div className="flex items-center gap-2 font-bold text-black text-sm">
                              <span>{meta.icon}</span>
                              <span>{meta.name}</span>
                            </div>
                            <div className="flex items-center border border-gray-200 rounded-lg overflow-hidden bg-white">
                              <button 
                                onClick={() => handleCurrencyChange(key, currency.value - 1)}
                                className="px-4 py-2 bg-white hover:bg-gray-50 text-xl font-medium border-r border-gray-200 select-none transition"
                              >
                                −
                              </button>
                              <input 
                                type="number" 
                                value={currency.value}
                                onChange={(e) => handleCurrencyChange(key, e.target.value)}
                                className="w-full text-center py-2 font-semibold text-gray-900 focus:outline-none text-base"
                              />
                              <button 
                                onClick={() => handleCurrencyChange(key, currency.value + 1)}
                                className="px-4 py-2 bg-white hover:bg-gray-50 text-xl font-medium border-l border-gray-200 select-none transition"
                              >
                                +
                              </button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ) : (
                    <div className="border border-gray-200 rounded-xl overflow-hidden bg-gray-50 p-2">
                      <textarea
                        className="w-full h-96 p-4 font-mono text-xs bg-white border border-gray-200 rounded-lg focus:outline-none resize-y leading-relaxed"
                        value={rawText}
                        onChange={handleRawChange}
                      />
                    </div>
                  )}
                </div>
              )}

              {/* ---------------- MODAL RESTORE ---------------- */}
              {showRestoreModal && (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                  <div className="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl border border-gray-100 transition transform scale-100">
                    <h3 className="text-lg font-bold text-black mb-1 text-center">Restore to original state</h3>
                    <p className="text-sm text-gray-500 mb-6 text-center">
                      Restore the file to the original state. You will lose all your changes.
                    </p>
                    <div className="flex flex-col gap-2">
                      <button 
                        onClick={handleRestore}
                        className="w-full bg-black text-white py-2.5 rounded-xl font-medium hover:bg-gray-800 transition"
                      >
                        Restore
                      </button>
                      <button 
                        onClick={() => setShowRestoreModal(false)}
                        className="w-full bg-gray-100 text-black py-2.5 rounded-xl font-medium hover:bg-gray-200 transition"
                      >
                        Close
                      </button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
